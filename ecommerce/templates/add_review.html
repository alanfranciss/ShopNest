<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review {{ product.name }} | ShopNest</title>
    <style>
        /* ==========================================================================
           1. IMPORTS & VARIABLES
           ========================================================================== */
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap');

        :root {
            --primary: #819A91;
            --primary-hover: #668077;
            --bg-body: #EEEFE0;
            --surface: #F8F3D9;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border: #D1D8BE;
        }

        /* ==========================================================================
           2. RESET & BASE STYLES
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3, h4, .font-heading {
            font-family: 'Outfit', sans-serif;
        }

        /* ==========================================================================
           3. LAYOUT & CARD STYLES
           ========================================================================== */
        .review-wrapper {
            padding-top: 85px; /* Navbar clearance */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-body);
            padding-bottom: 2rem;
            padding-left: 1rem;
            padding-right: 1rem;
        }

        .review-card {
            background: var(--surface);
            border-radius: 20px;
            padding: 3.5rem 3rem;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
        }

        .review-title {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: #2C3E35;
            margin-bottom: 0.5rem;
            text-align: center;
            line-height: 1.2;
        }

        .review-subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            font-size: 1.05rem;
        }

        /* ==========================================================================
           4. FORM ELEMENTS
           ========================================================================== */
        .review-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group.center {
            align-items: center;
            margin-bottom: 1rem;
        }

        .form-label {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-main);
        }

        .star-container {
            display: flex;
            gap: 8px;
            cursor: pointer;
        }

        .star-icon {
            width: 40px;
            height: 40px;
            transition: all 0.2s ease;
        }

        .form-textarea {
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            resize: vertical;
            background-color: white;
            width: 100%;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(129, 154, 145, 0.15);
        }

        /* ==========================================================================
           5. BUTTONS
           ========================================================================== */
        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .btn {
            padding: 1rem;
            border-radius: 10px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            font-size: 1.05rem;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: all 0.2s ease;
            border: none;
        }

        .btn-cancel {
            flex: 1;
            background: #E5E7EB;
            color: var(--text-main);
        }

        .btn-cancel:hover {
            background: #D1D5DB;
        }

        .btn-submit {
            flex: 2;
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 10px rgba(129, 154, 145, 0.2);
        }

        .btn-submit:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(129, 154, 145, 0.3);
        }

        /* ==========================================================================
           6. RESPONSIVE MEDIA QUERIES
           ========================================================================== */
        @media (max-width: 640px) {
            .review-wrapper {
                align-items: flex-start; /* Push card to top on mobile */
                padding-top: 100px;
            }

            .review-card {
                padding: 2rem 1.5rem;
                border-radius: 16px;
            }

            .review-title {
                font-size: 1.8rem;
            }

            .review-subtitle {
                font-size: 0.95rem;
                margin-bottom: 2rem;
            }

            .star-icon {
                width: 32px;
                height: 32px;
            }

            .btn-group {
                flex-direction: column; /* Stack buttons vertically */
                gap: 0.75rem;
            }

            .btn-cancel {
                order: 2; /* Put cancel button on bottom */
            }

            .btn-submit {
                order: 1; /* Put submit button on top */
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    {% include 'navbar.html' %}

    <div class="review-wrapper">
        <div class="review-card">
            <h1 class="review-title">
                {% if review %}Edit Your Review{% else %}Write a Review{% endif %}
            </h1>
            <p class="review-subtitle">
                Share your thoughts on <strong>{{ product.name }}</strong>
            </p>

            <form method="post" class="review-form">
                {% csrf_token %}
                
                <!-- Rating Stars -->
                <div class="form-group center">
                    <label class="form-label">Rating</label>
                    <input type="hidden" name="rating" id="rating_input" value="{% if review %}{{ review.rating }}{% else %}0{% endif %}" required>
                    <div id="star-container" class="star-container">
                        {% for i in "12345" %}
                        <svg class="star-icon" data-value="{{ forloop.counter }}" viewBox="0 0 24 24" 
                             fill="{% if review and forloop.counter <= review.rating %}#F59E0B{% else %}#E5E7EB{% endif %}" 
                             stroke="{% if review and forloop.counter <= review.rating %}#F59E0B{% else %}#E5E7EB{% endif %}" 
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                        </svg>
                        {% endfor %}
                    </div>
                </div>

                <script>
                    const stars = document.querySelectorAll('.star-icon');
                    const ratingInput = document.getElementById('rating_input');
                    let currentRating = parseInt(ratingInput.value) || 0;

                    const updateStars = (rating, isHover = false) => {
                        stars.forEach((star, index) => {
                            const val = index + 1;
                            if (val <= rating) {
                                star.setAttribute('fill', isHover ? '#FCD34D' : '#F59E0B');
                                star.setAttribute('stroke', isHover ? '#FCD34D' : '#F59E0B');
                                star.style.transform = isHover ? 'scale(1.15)' : 'scale(1)';
                            } else {
                                star.setAttribute('fill', '#E5E7EB');
                                star.setAttribute('stroke', '#E5E7EB');
                                star.style.transform = 'scale(1)';
                            }
                        });
                    };

                    stars.forEach(star => {
                        star.addEventListener('mouseover', function() {
                            updateStars(parseInt(this.getAttribute('data-value')), true);
                        });
                        
                        star.addEventListener('mouseout', function() {
                            updateStars(currentRating, false);
                        });
                        
                        star.addEventListener('click', function() {
                            currentRating = parseInt(this.getAttribute('data-value'));
                            ratingInput.value = currentRating;
                            updateStars(currentRating, false);
                        });
                    });

                    // Ensure form submission doesn't happen with 0 rating
                    document.querySelector('form').addEventListener('submit', function(e) {
                        if (ratingInput.value === '0') {
                            e.preventDefault();
                            alert('Please select a star rating.');
                        }
                    });
                </script>

                <!-- Review Text Area -->
                <div class="form-group">
                    <label for="comment" class="form-label" style="font-size: 0.95rem;">Your Review</label>
                    <textarea name="comment" id="comment" rows="5" class="form-textarea" required placeholder="What did you like or dislike about this product?">{% if review %}{{ review.comment }}{% endif %}</textarea>
                </div>

                <!-- Action Buttons -->
                <div class="btn-group">
                    <button type="button" onclick="history.back()" class="btn btn-cancel">Cancel</button>
                    <button type="submit" class="btn btn-submit">
                        {% if review %}Update Review{% else %}Submit Review{% endif %}
                    </button>
                </div>
            </form>
        </div>
    </div>

    {% include 'footer.html' %}
</body>
</html>
