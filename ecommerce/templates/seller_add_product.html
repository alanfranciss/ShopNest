<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product | ShopNest Seller</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap');

        :root {
            --primary: #819A91;
            --primary-hover: #668077;
            --bg-body: #EEEFE0;
            --surface: #F8F3D9;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border: #D1D8BE;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .page-header {
            background: linear-gradient(135deg, #1E3E2F 0%, #112A1F 100%);
            padding: 8rem 2rem 4rem;
            color: white;
            text-align: center;
        }

        .page-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .dashboard-container {
            max-width: 800px;
            margin: -3rem auto 4rem;
            padding: 0 2rem;
            width: 100%;
            position: relative;
            z-index: 10;
        }

        .card {
            background: var(--surface);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        .card-header h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-main);
        }

        .form-control {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: all 0.2s;
            background: #fff;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(129, 154, 145, 0.2);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 120px;
        }

        .btn-submit {
            background: var(--primary);
            color: white;
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            font-family: 'Inter', sans-serif;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
        }

        .btn-back {
            display: inline-block;
            color: var(--text-muted);
            text-decoration: none;
            margin-bottom: 1rem;
            font-weight: 500;
        }
        
        .btn-back:hover {
            color: var(--text-main);
        }

        .messages {
            margin-bottom: 1rem;
        }
        .message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 0.5rem;
        }
        .message.success {
            background-color: #DEF7EC;
            color: #03543F;
        }
        .message.error {
            background-color: #FDE8E8;
            color: #9B1C1C;
        }
    </style>
</head>

<body>
    {% include 'navbar.html' %}

    <div class="page-header">
        <h1>Add New Product</h1>
    </div>

    <div class="dashboard-container">
        <a href="{% url 'seller_dashboard' %}" class="btn-back">← Back to Dashboard</a>
        
        <div class="card">
            <div class="card-header">
                <h2>Product Details</h2>
            </div>

            {% if messages %}
            <div class="messages">
                {% for message in messages %}
                <div class="message {{ message.tags }}">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <form method="POST" action="{% url 'seller_add_product' %}" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="name">Product Name *</label>
                    <input type="text" id="name" name="name" class="form-control" required>
                </div>

                <div class="form-group">
                    <label for="category">Category *</label>
                    <select id="category" name="category" class="form-control" required>
                        <option value="">Select a category</option>
                        {% for category in categories %}
                        <option value="{{ category.id }}">{{ category.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="price">Price (₹) *</label>
                    <input type="number" id="price" name="price" step="0.01" min="0" class="form-control" required>
                </div>

                <div class="form-group">
                    <label for="quantity">Quantity in Stock *</label>
                    <input type="number" id="quantity" name="quantity" min="1" value="1" class="form-control" required>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" class="form-control"></textarea>
                </div>

                <div class="form-group">
                    <label for="image">Product Image</label>
                    <input type="file" id="image" name="image" class="form-control" accept="image/*">
                </div>

                <button type="submit" class="btn-submit">Add Product</button>
            </form>
        </div>
    </div>

    {% include 'footer.html' %}
</body>

</html>
